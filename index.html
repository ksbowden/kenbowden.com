<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ken Bowden</title>
  <meta name="description" content="Ken Bowden">
  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: #131313;
      color: #e5e2e1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* --- Ambient Light (radial gradient, blurred) --- */
    .ambient {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 0;
    }

    .ambient-glow {
      width: 100%;
      height: 100%;
      opacity: 0.7;
      filter: blur(20px);
      background: radial-gradient(
        ellipse at center,
        rgba(255, 171, 243, 0.15) 0%,
        rgba(128, 196, 232, 0.125) 15%,
        rgba(0, 221, 221, 0.1) 30%,
        rgba(103, 213, 111, 0.075) 45%,
        rgba(205, 205, 0, 0.05) 60%,
        rgba(205, 205, 0, 0) 100%
      );
    }

    /* --- Structural overlay (subtle color fringing) --- */
    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(255, 0, 0, 0.02),
        rgba(0, 255, 0, 0.01) 50%,
        rgba(0, 255, 0, 0.02)
      );
      pointer-events: none;
      z-index: 2;
    }

    /* --- Main content --- */
    .main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 24px;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* --- Heading with chromatic aberration --- */
    .heading {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(3rem, 7.5vw, 96px);
      line-height: 1;
      text-align: center;
      letter-spacing: -0.05em;
      color: #e5e2e1;
      text-shadow:
        1.5px 0 0.5px rgba(255, 171, 243, 0.6),
        -1.5px 0 0.5px rgba(0, 221, 221, 0.6);
    }

    /* --- Navigation links --- */
    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 24px;
      text-decoration: none;
      color: #c6c6c6;
      transition: color 0.3s ease;
    }

    .nav-link:hover {
      color: #e5e2e1;
    }

    .nav-link:hover .nav-icon svg {
      fill: #e5e2e1;
    }

    .nav-icon {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .nav-icon svg {
      fill: #00dddd;
      transition: fill 0.3s ease;
    }

    .nav-label {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 2.4px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* --- Reflective surface line --- */
    .reflective-line {
      position: absolute;
      bottom: 25%;
      left: 50%;
      transform: translateX(-50%);
      width: 128px;
      height: 1px;
      background: linear-gradient(
        to right,
        rgba(255, 171, 243, 0),
        rgba(255, 171, 243, 0.2) 50%,
        rgba(255, 171, 243, 0)
      );
      pointer-events: none;
    }

    /* --- Footer --- */
    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      z-index: 1;
    }

    .footer-text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 400;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #cdcd00;
      opacity: 0.3;
    }

    /* --- CRT Effects --- */

    /* Scan lines */
    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
    }

    /* Horizontal scan bar that sweeps down the screen */
    .scan-bar {
      position: fixed;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(128, 196, 232, 0.04),
        rgba(255, 171, 243, 0.03),
        transparent
      );
      pointer-events: none;
      z-index: 4;
      animation: scan-sweep 8s linear infinite;
    }

    @keyframes scan-sweep {
      0%   { top: -6px; }
      100% { top: 100%; }
    }

    /* Subtle screen flicker */
    .crt-flicker {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      animation: flicker 0.15s infinite;
      opacity: 0;
    }

    @keyframes flicker {
      0%   { opacity: 0; }
      50%  { opacity: 0.0025; background: #fff; }
      100% { opacity: 0; }
    }

    /* CRT vignette (curved screen darkening at edges) */
    .crt-vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      background: radial-gradient(
        ellipse at center,
        transparent 60%,
        rgba(0, 0, 0, 0.4) 100%
      );
    }

    /* Animated chromatic aberration on heading */
    .heading {
      animation: chroma-shift 6s ease-in-out infinite;
    }

    @keyframes chroma-shift {
      0%, 100% {
        text-shadow:
          1.5px 0 0.5px rgba(255, 171, 243, 0.7),
          -1.5px 0 0.5px rgba(0, 221, 221, 0.7),
          2.5px 0 2px rgba(255, 171, 243, 0.25),
          -2.5px 0 2px rgba(0, 221, 221, 0.25);
      }
      25% {
        text-shadow:
          2px 0.3px 0.6px rgba(255, 171, 243, 0.75),
          -1px -0.2px 0.5px rgba(0, 221, 221, 0.6),
          3px 0.3px 2.5px rgba(255, 171, 243, 0.2),
          -2px -0.2px 2px rgba(0, 221, 221, 0.15);
      }
      50% {
        text-shadow:
          1px -0.2px 0.5px rgba(255, 171, 243, 0.6),
          -2px 0.3px 0.6px rgba(0, 221, 221, 0.75),
          2px -0.2px 2px rgba(255, 171, 243, 0.15),
          -3px 0.3px 2.5px rgba(0, 221, 221, 0.2);
      }
      75% {
        text-shadow:
          1.8px 0.1px 0.5px rgba(255, 171, 243, 0.7),
          -1.5px -0.1px 0.5px rgba(0, 221, 221, 0.65),
          2.8px 0.1px 2.2px rgba(255, 171, 243, 0.22),
          -2.8px -0.1px 2.2px rgba(0, 221, 221, 0.18);
      }
    }

    /* Ambient glow breathing */
    .ambient-glow {
      animation: glow-breathe 10s ease-in-out infinite;
    }

    @keyframes glow-breathe {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50%      { opacity: 0.85; transform: scale(1.03); }
    }

    /* Reflective line shimmer */
    .reflective-line {
      animation: line-shimmer 4s ease-in-out infinite;
    }

    @keyframes line-shimmer {
      0%, 100% { opacity: 1; width: 128px; }
      50%      { opacity: 0.5; width: 96px; }
    }

/* --- Mouse brightness glow (CRT phosphor) --- */
    .mouse-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      transform: translate(-50%, -50%);
      background: radial-gradient(
        circle,
        rgba(200, 210, 220, 0.03) 0%,
        rgba(200, 210, 220, 0.01) 40%,
        transparent 70%
      );
      opacity: 0;
      transition: opacity 0.3s;
    }

    /* --- CRT tap ripple --- */
    .crt-tap {
      position: fixed;
      pointer-events: none;
      z-index: 99;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
      border-radius: 50%;
      opacity: 1;
    }

    .crt-tap--pink {
      background: radial-gradient(circle, rgba(255, 171, 243, 0.15) 0%, transparent 70%);
      animation: crt-tap-expand 0.2s ease-out forwards;
    }

    .crt-tap--cyan {
      background: radial-gradient(circle, rgba(0, 221, 221, 0.12) 0%, transparent 70%);
      animation: crt-tap-expand 0.2s 0.02s ease-out forwards;
    }

    @keyframes crt-tap-expand {
      0%   { width: 0; height: 0; opacity: 0.5; }
      40%  { opacity: 0.3; }
      100% { width: 250px; height: 250px; opacity: 0; }
    }

    /* --- Responsive --- */
    @media (max-width: 600px) {
      .nav {
        gap: 16px;
      }

      .nav-link {
        padding: 8px 10px;
        gap: 8px;
      }

      .nav-label {
        font-size: 10px;
        letter-spacing: 1.5px;
      }
    }
  </style>
</head>
<body>

  <div class="ambient">
    <div class="ambient-glow"></div>
  </div>

  <div class="overlay"></div>
  <div class="scanlines"></div>
  <div class="scan-bar"></div>
  <div class="crt-flicker"></div>
  <div class="crt-vignette"></div>

  <div class="main">
    <div class="hero">
      <h1 class="heading">KEN BOWDEN</h1>
      <nav class="nav">
        <a href="https://ken-wine.web.app" target="_blank" rel="noopener" class="nav-link">
          <span class="nav-icon">
            <svg width="12" height="18" viewBox="0 0 12 18" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 18V16H5V11.9C3.567 11.667 2.375 11 1.425 9.9C0.475 8.8 0 7.5 0 6V0H12V6C12 7.5 11.525 8.8 10.575 9.9C9.625 11 8.433 11.667 7 11.9V16H10V18H2ZM6 10C6.933 10 7.75 9.717 8.45 9.15C9.15 8.583 9.617 7.867 9.85 7H2.15C2.383 7.867 2.85 8.583 3.55 9.15C4.25 9.717 5.067 10 6 10ZM2 5H10V2H2V5Z"/>
            </svg>
          </span>
          <span class="nav-label">Wine</span>
        </a>
        <a href="https://chat.kenbowden.com" target="_blank" rel="noopener" class="nav-link">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 20V2C0 1.45 0.196 0.979 0.588 0.588C0.979 0.196 1.45 0 2 0H18C18.55 0 19.021 0.196 19.413 0.588C19.804 0.979 20 1.45 20 2V14C20 14.55 19.804 15.021 19.413 15.413C19.021 15.804 18.55 16 18 16H4L0 20ZM3.15 14H18V2H2V15.125L3.15 14Z"/>
            </svg>
          </span>
          <span class="nav-label">Chat</span>
        </a>
        <a href="https://www.linkedin.com/in/kennethsbowden/" target="_blank" rel="noopener" class="nav-link">
          <span class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
              <path d="M4.02 18H0.3V5.98H4.02V18ZM2.16 4.34C0.97 4.34 0 3.35 0 2.16C0 0.97 0.97 0 2.16 0C3.35 0 4.32 0.97 4.32 2.16C4.32 3.35 3.35 4.34 2.16 4.34ZM18 18H14.28V12.15C14.28 10.73 14.25 8.91 12.31 8.91C10.34 8.91 10.04 10.45 10.04 12.05V18H6.32V5.98H9.89V7.66H9.94C10.44 6.7 11.68 5.68 13.52 5.68C17.28 5.68 18 8.17 18 11.4V18Z"/>
            </svg>
          </span>
          <span class="nav-label">LinkedIn</span>
        </a>
      </nav>
    </div>

    <div class="reflective-line"></div>
  </div>

  <div class="mouse-glow"></div>

  <footer class="footer">
    <span class="footer-text">&copy; Ken Bowden MMXXVI</span>
  </footer>

  <script>
    const mouseGlow = document.querySelector('.mouse-glow');

    document.addEventListener('mousemove', (e) => {
      mouseGlow.style.left = e.clientX + 'px';
      mouseGlow.style.top = e.clientY + 'px';
      mouseGlow.style.opacity = '1';
    });

    document.addEventListener('mouseleave', () => {
      mouseGlow.style.opacity = '0';
    });

    // CRT tap effect on click
    document.addEventListener('mousedown', (e) => {
      const pink = document.createElement('div');
      const cyan = document.createElement('div');
      pink.className = 'crt-tap crt-tap--pink';
      cyan.className = 'crt-tap crt-tap--cyan';
      pink.style.left = e.clientX + 'px';
      pink.style.top = e.clientY + 'px';
      cyan.style.left = (e.clientX + 3) + 'px';
      cyan.style.top = (e.clientY - 2) + 'px';
      document.body.appendChild(pink);
      document.body.appendChild(cyan);
      pink.addEventListener('animationend', () => pink.remove());
      cyan.addEventListener('animationend', () => cyan.remove());
    });
  </script>

</body>
</html>
